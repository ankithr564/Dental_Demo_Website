openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dental Clinic API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: appointments
    description: Appointment booking
  - name: contact
    description: Contact form submissions
  - name: testimonials
    description: Patient testimonials
  - name: blog
    description: Blog posts
  - name: faqs
    description: Frequently asked questions
  - name: services
    description: Dental services
  - name: doctors
    description: Doctors / team members
  - name: newsletter
    description: Newsletter subscriptions
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Contact submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"

  /testimonials:
    get:
      operationId: listTestimonials
      tags: [testimonials]
      summary: Get patient testimonials
      responses:
        "200":
          description: List of testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"

  /blog:
    get:
      operationId: listBlogPosts
      tags: [blog]
      summary: List blog posts
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          description: Max number to return
      responses:
        "200":
          description: List of blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogPost"

  /blog/{id}:
    get:
      operationId: getBlogPost
      tags: [blog]
      summary: Get a single blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPost"
        "404":
          description: Not found

  /faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      summary: Get FAQs
      responses:
        "200":
          description: List of FAQs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Faq"

  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List dental services
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"

  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List doctors / team members
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"

  /newsletter:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      summary: Subscribe to newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsletterInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscription"

  /stats:
    get:
      operationId: getStats
      tags: [health]
      summary: Get clinic stats (patients served, years, doctors, etc.)
      responses:
        "200":
          description: Clinic statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Appointment:
      type: object
      required: [id, name, email, phone, service, date, time, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        service:
          type: string
        doctor:
          type: ["string", "null"]
        date:
          type: string
          description: ISO date string
        time:
          type: string
        message:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, confirmed, cancelled]
        createdAt:
          type: string

    AppointmentInput:
      type: object
      required: [name, email, phone, service, date, time]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        service:
          type: string
        doctor:
          type: string
        date:
          type: string
        time:
          type: string
        message:
          type: string

    ContactInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        subject:
          type: string
        message:
          type: string

    ContactSubmission:
      type: object
      required: [id, name, email, subject, message, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string

    Testimonial:
      type: object
      required: [id, name, rating, review, treatment, avatarUrl]
      properties:
        id:
          type: integer
        name:
          type: string
        rating:
          type: integer
        review:
          type: string
        treatment:
          type: string
        avatarUrl:
          type: string
        date:
          type: string

    BlogPost:
      type: object
      required: [id, title, slug, excerpt, content, author, category, imageUrl, publishedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        author:
          type: string
        category:
          type: string
        imageUrl:
          type: string
        publishedAt:
          type: string
        readTime:
          type: ["integer", "null"]

    Faq:
      type: object
      required: [id, question, answer, category]
      properties:
        id:
          type: integer
        question:
          type: string
        answer:
          type: string
        category:
          type: string

    Service:
      type: object
      required: [id, name, description, icon, imageUrl, price]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        imageUrl:
          type: string
        price:
          type: string
        duration:
          type: ["string", "null"]
        highlights:
          type: array
          items:
            type: string

    Doctor:
      type: object
      required: [id, name, specialty, bio, imageUrl, education, experience]
      properties:
        id:
          type: integer
        name:
          type: string
        specialty:
          type: string
        bio:
          type: string
        imageUrl:
          type: string
        education:
          type: string
        experience:
          type: integer
        languages:
          type: array
          items:
            type: string
        social:
          type: object
          properties:
            linkedin:
              type: ["string", "null"]
            twitter:
              type: ["string", "null"]

    NewsletterInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
        name:
          type: ["string", "null"]

    NewsletterSubscription:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: ["string", "null"]
        createdAt:
          type: string

    ClinicStats:
      type: object
      required: [patientsServed, yearsExperience, doctorsCount, satisfactionRate]
      properties:
        patientsServed:
          type: integer
        yearsExperience:
          type: integer
        doctorsCount:
          type: integer
        satisfactionRate:
          type: number
        awardsWon:
          type: integer
